version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: easykol
      POSTGRES_USER: easykol
      POSTGRES_PASSWORD: easykol_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  engine:
    build: ./engine
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://easykol:easykol_dev@postgres:5432/easykol
      REDIS_URL: redis://redis:6379
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      HUNTER_API_KEY: ${HUNTER_API_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./engine:/app

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      ENGINE_URL: http://engine:8000
    depends_on:
      - engine

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src

volumes:
  pgdata:
